[audio]
enable_overdrive = false
enable_sounds = false
notification_sound = ""
sound_volume = 0.5
volume_change_sound = ""

[backdrop]
blur_intensity = 0.5
enabled = false
tint_intensity = 0.30000001192092896

[bar]
order = [ "main" ]

    [bar.main]
    auto_hide = false
    background_opacity = 0.75
    border = "outline"
    border_width = 0.0
    capsule = true
    capsule_fill = "surface_variant"
    capsule_group = []
    capsule_opacity = 1.0
    capsule_padding = 6.0
    center = [ "date", "control-center", "clock" ]
    contact_shadow = false
    enabled = true
    end = [ "media", "weather", "tray", "clipboard", "notifications", "bluetooth", "network", "volume", "temp", "battery" ]
    font_weight = 500
    layer = "top"
    margin_edge = 10
    margin_ends = 10
    padding = 10
    panel_overlap = 2
    position = "top"
    radius = 12
    radius_bottom_left = 6
    radius_bottom_right = 6
    radius_top_left = 6
    radius_top_right = 6
    reserve_space = true
    scale = 1.0
    shadow = true
    start = [ "launcher", "workspaces" ]
    thickness = 30
    widget_spacing = 4

        [bar.main.monitor.DP-2]
        auto_hide = false
        background_opacity = 0.75
        border = "outline"
        border_width = 0.0
        capsule = true
        capsule_fill = "surface_variant"
        capsule_group = []
        capsule_opacity = 1.0
        capsule_padding = 6.0
        center = []
        contact_shadow = false
        enabled = true
        end = []
        font_weight = 500
        layer = "top"
        margin_edge = 10
        margin_ends = 10
        match = "DP-2"
        padding = 10
        panel_overlap = 2
        radius = 12
        radius_bottom_left = 6
        radius_bottom_right = 6
        radius_top_left = 6
        radius_top_right = 6
        reserve_space = true
        scale = 1.0
        shadow = true
        start = [ "workspaces" ]
        thickness = 30
        widget_spacing = 4

[battery]
warning_threshold = 20

[brightness]
enable_ddcutil = true
ignore_mmids = []

[calendar]
accounts = []
enabled = true
refresh_minutes = 15

[control_center]
sidebar = "full"
sidebar_section = "full"

    [[control_center.shortcuts]]
    type = "wifi"

    [[control_center.shortcuts]]
    type = "bluetooth"

    [[control_center.shortcuts]]
    type = "caffeine"

    [[control_center.shortcuts]]
    type = "nightlight"

    [[control_center.shortcuts]]
    type = "notification"

    [[control_center.shortcuts]]
    type = "power_profile"

[desktop_widgets]
enabled = false
schema_version = 1

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

[dock]
active_monitor_only = true
active_opacity = 1.0
active_scale = 1.0
auto_hide = true
background_opacity = 0.75
enabled = true
icon_size = 30
inactive_opacity = 0.85000002384185791
inactive_scale = 1.0
item_spacing = 4
launcher_icon = "grid-dots"
launcher_position = "start"
margin_edge = 8
margin_ends = 0
monitors = []
padding = 6
pinned = []
position = "bottom"
radius = 8
radius_bottom_left = 16
radius_bottom_right = 16
radius_top_left = 16
radius_top_right = 16
reserve_space = false
shadow = true
show_dots = false
show_instance_count = true
show_running = true

[hooks]
battery_charging = []
battery_discharging = []
battery_percentage_changed = []
bluetooth_disabled = []
bluetooth_enabled = []
colors_changed = []
logging_out = []
power_profile_changed = []
rebooting = []
session_locked = []
session_unlocked = []
shutting_down = []
started = []
theme_mode_changed = []
wallpaper_changed = []
wifi_disabled = []
wifi_enabled = []

[idle]
behavior_order = [ "lock", "screen-off" ]
pre_action_fade_seconds = 2.0

    [idle.behavior.lock]
    action = "lock"
    command = "noctalia:screen-lock"
    enabled = false
    resume_command = ""
    timeout = 600

    [idle.behavior.screen-off]
    action = "screen_off"
    command = "noctalia:dpms-off"
    enabled = false
    resume_command = "noctalia:dpms-on"
    timeout = 660

[keybinds]
cancel = [ "Escape" ]
down = [ "Down" ]
left = [ "Left" ]
right = [ "Right" ]
up = [ "Up" ]
validate = [ "Return", "KP_Enter" ]

[location]
address = "Belmopan, Belize"
auto_locate = false
sunrise = ""
sunset = ""

[lockscreen]
blur_intensity = 0.5
blurred_desktop = false
tint_intensity = 0.30000001192092896
wallpaper_blur_intensity = 0.0
wallpaper_tint_intensity = 0.0

[nightlight]
enabled = false
force = true
temperature_day = 6500
temperature_night = 4900

[notification]
background_opacity = 0.75
collapse_on_dismiss = true
enable_daemon = true
layer = "top"
monitors = [ "DP-1" ]
offset_x = 10
offset_y = 10
position = "top_right"
scale = 1.0
show_app_name = true

[osd]
background_opacity = 0.75
keyboard_layout = true
lock_keys = true
monitors = [ "DP-1" ]
offset_x = 10
offset_y = 10
orientation = "horizontal"
position = "top_right"
scale = 1.0

[shell]
avatar_path = "/home/packet/Pictures/nixconfig-avatars/hackmon.png"
clipboard_auto_paste = "auto"
clipboard_confirm_clear_history = false
clipboard_enabled = true
clipboard_history_max_entries = 25
clipboard_image_action_command = ""
corner_radius_scale = 0.5
date_format = "%A, %x"
disable_mipmaps = false
font_family = "Noto Sans"
lang = "en"
launch_apps_as_systemd_services = false
middle_click_opens_widget_settings = true
niri_overview_type_to_launch_enabled = true
offline_mode = false
password_style = "random"
polkit_agent = true
screen_time_enabled = true
settings_show_advanced = true
setup_wizard_enabled = true
shared_gl_context = true
show_location = true
telemetry_enabled = true
time_format = "{:%-I:%M %p}"
ui_scale = 1.0

    [shell.animation]
    enabled = true
    speed = 1.0

    [shell.mpris]
    blacklist = []

    [shell.panel]
    background_blur = true
    borders = true
    clipboard_placement = "attached"
    control_center_placement = "attached"
    launcher_categories = false
    launcher_compact = false
    launcher_placement = "centered"
    launcher_show_icons = true
    open_near_click_clipboard = true
    open_near_click_control_center = false
    open_near_click_launcher = false
    open_near_click_session = false
    open_near_click_wallpaper = false
    session_placement = "attached"
    shadow = true
    transparency_mode = "glass"
    wallpaper_placement = "attached"

    [shell.screen_corners]
    enabled = false
    size = 32

    [[shell.session.actions]]
    action = "lock"
    command = ""
    enabled = true
    glyph = ""
    label = ""
    shortcut = "1"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    command = ""
    enabled = true
    glyph = ""
    label = ""
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "suspend"
    command = ""
    enabled = true
    glyph = ""
    label = ""
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    command = ""
    enabled = true
    glyph = ""
    label = ""
    shortcut = "4"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    command = ""
    enabled = true
    glyph = ""
    label = ""
    shortcut = "5"
    variant = "destructive"

    [shell.shadow]
    alpha = 0.55000001192092896
    direction = "down"

[system.monitor]
cpu_poll_seconds = 2.0
disk_poll_seconds = 10.0
enabled = true
gpu_poll_seconds = 5.0
memory_poll_seconds = 2.0
network_poll_seconds = 3.0

[theme]
builtin = "Noctalia"
community_palette = "Oxocarbon"
custom_palette = ""
mode = "auto"
source = "wallpaper"
wallpaper_scheme = "m3-rainbow"

    [theme.templates]
    builtin_ids = [ "btop", "gtk3", "gtk4", "helix", "kcolorscheme", "kitty", "niri", "qt" ]
    community_ids = [ "vscode", "steam", "telegram" ]
    enable_builtin_templates = true
    enable_community_templates = true

[wallpaper]
directory = "~/Pictures/Wallpapers"
directory_dark = ""
directory_light = ""
edge_smoothness = 0.30000001192092896
enabled = true
fill_color = ""
fill_mode = "crop"
per_monitor_directories = false
transition = [ "disc", "fade", "honeycomb", "stripes", "wipe", "zoom" ]
transition_duration = 1500.0
transition_on_startup = false

    [wallpaper.automation]
    enabled = false
    interval_minutes = 0
    order = "random"
    recursive = true

    [wallpaper.default]
    path = "~/Pictures/Wallpapers/nixconfig-wallpapers/tnt-camp.jpg"

[weather]
effects = true
enabled = true
refresh_minutes = 30
unit = "imperial"

[widget.active_window]
icon_size = 14.0
max_length = 260.0
min_length = 80.0
title_scroll = "none"
type = "active_window"

[widget.bongocat]
audio_spectrum = true
script = "scripts/bongocat.lua"
tappy_mode = true
type = "scripted"

[widget.brightness]
show_label = false
type = "brightness"

[widget.clock]
format = "{:%-I:%M %p}"
type = "clock"

[widget.control-center]
anchor = true
glyph = "paw-filled"
type = "control-center"

[widget.cpu]
stat = "cpu_usage"
type = "sysmon"

[widget.date]
format = "{:%A %e %b %Y}"
type = "clock"

[widget.input_volume]
device = "input"
type = "volume"

[widget.keyboard_layout]
cycle_command = ""
hide_when_single_layout = false
type = "keyboard_layout"

[widget.lock_keys]
display = "short"
hide_when_off = false
show_caps_lock = true
show_num_lock = true
show_scroll_lock = false
type = "lock_keys"

[widget.media]
art_size = 16.0
hide_when_no_media = true
max_length = 220.0
min_length = 80.0
title_scroll = "always"
type = "media"

[widget.network]
show_label = false
type = "network"

[widget.network_rx]
stat = "net_rx"
type = "sysmon"

[widget.network_tx]
stat = "net_tx"
type = "sysmon"

[widget.output_volume]
device = "output"
type = "volume"

[widget.ram]
stat = "ram_used"
type = "sysmon"

[widget.spacer]
type = "spacer"

[widget.sysmon]
stat = "cpu_temp"
type = "sysmon"

[widget.temp]
stat = "cpu_temp"
type = "sysmon"

[widget.tray]
drawer = true
drawer_columns = 5
match_adjacent_spacing = true
type = "tray"

[widget.weather]
show_condition = false

[widget.workspaces]
display = "name"
max_label_chars = 10
type = "workspaces"
