[audio]
enable_overdrive = false
enable_sounds = false
notification_sound = ""
sound_volume = 0.5
volume_change_sound = ""

[backdrop]
blur_intensity = 0.5
enabled = false
tint_intensity = 0.30000001192092896

[bar]
order = [ "main" ]

    [bar.main]
    auto_hide = false
    background_opacity = 1.0
    border = "outline"
    border_width = 0.0
    capsule = true
    capsule_fill = "surface_variant"
    capsule_groups = []
    capsule_opacity = 1.0
    capsule_padding = 6.0
    center = [ "date", "clock" ]
    contact_shadow = false
    enabled = true
    end = [
        "media",
        "tray",
        "sysmon",
        "notifications",
        "clipboard",
        "network",
        "bluetooth",
        "volume",
        "brightness",
        "battery",
        "control-center",
        "session"
    ]
    font_weight = 500
    margin_edge = 6
    margin_ends = 6
    padding = 14
    position = "top"
    radius = 12
    radius_bottom_left = 12
    radius_bottom_right = 12
    radius_top_left = 12
    radius_top_right = 12
    reserve_space = true
    scale = 1.0
    shadow = true
    start = [ "launcher", "workspaces" ]
    thickness = 34
    widget_spacing = 6

        [bar.main.monitor.DP-2]
        auto_hide = false
        background_opacity = 1.0
        border = "outline"
        border_width = 0.0
        capsule = true
        capsule_fill = "surface_variant"
        capsule_groups = []
        capsule_opacity = 1.0
        capsule_padding = 6.0
        center = [ "workspaces" ]
        contact_shadow = false
        enabled = true
        end = []
        font_weight = 500
        margin_edge = 6
        margin_ends = 6
        match = "DP-2"
        padding = 14
        radius = 12
        radius_bottom_left = 12
        radius_bottom_right = 12
        radius_top_left = 12
        radius_top_right = 12
        reserve_space = true
        scale = 1.0
        shadow = true
        start = []
        thickness = 34
        widget_spacing = 6

[brightness]
enable_ddcutil = true
ignore_mmids = []

[control_center]
compact = true

    [[control_center.shortcuts]]
    type = "wifi"

    [[control_center.shortcuts]]
    type = "bluetooth"

    [[control_center.shortcuts]]
    type = "caffeine"

    [[control_center.shortcuts]]
    type = "nightlight"

    [[control_center.shortcuts]]
    type = "notification"

    [[control_center.shortcuts]]
    type = "power_profile"

[desktop_widgets]
enabled = false
schema_version = 1

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

[dock]
active_monitor_only = true
active_opacity = 1.0
active_scale = 1.0
auto_hide = true
background_opacity = 0.87999999523162842
enabled = true
icon_size = 36
inactive_opacity = 0.85000002384185791
inactive_scale = 1.0
item_spacing = 6
launcher_icon = "grid-dots"
launcher_position = "none"
margin_edge = 8
margin_ends = 0
monitors = [ "DP-1" ]
padding = 8
pinned = []
position = "bottom"
radius = 16
radius_bottom_left = 16
radius_bottom_right = 16
radius_top_left = 16
radius_top_right = 16
reserve_space = false
shadow = true
show_dots = false
show_instance_count = true
show_running = true

[hooks]
battery_low_percent_threshold = 0
battery_state_changed = []
battery_under_threshold = []
bluetooth_disabled = []
bluetooth_enabled = []
colors_changed = []
logging_out = []
power_profile_changed = []
rebooting = []
session_locked = []
session_unlocked = []
shutting_down = []
started = []
theme_mode_changed = []
wallpaper_changed = []
wifi_disabled = []
wifi_enabled = []

[idle]
behavior_order = [ "lock", "screen-off" ]
pre_action_fade_seconds = 2.0

    [idle.behavior.lock]
    action = "lock"
    command = "noctalia:screen-lock"
    enabled = false
    lock_before_suspend = true
    resume_command = ""
    timeout = 600

    [idle.behavior.screen-off]
    action = "screen_off"
    command = "noctalia:dpms-off"
    enabled = false
    lock_before_suspend = true
    resume_command = "noctalia:dpms-on"
    timeout = 660

[keybinds]
cancel = [ "Escape" ]
down = [ "Down" ]
left = [ "Left" ]
right = [ "Right" ]
up = [ "Up" ]
validate = [ "Return", "KP_Enter" ]

[nightlight]
enabled = false
force = false
start_time = ""
stop_time = ""
temperature_day = 6500
temperature_night = 4000
use_weather_location = true

[notification]
background_opacity = 0.89999997615814209
enable_daemon = true
layer = "top"
monitors = [ "DP-1" ]
offset_x = 20
offset_y = 8
position = "top_right"
scale = 1.0

[osd]
keyboard_layout = true
lock_keys = true
orientation = "horizontal"
position = "top_right"
scale = 1.0

[shell]
clipboard_auto_paste = "auto"
clipboard_enabled = true
clipboard_history_max_entries = 50
clipboard_image_action_command = ""
corner_radius_scale = 1.0
date_format = "%A, %x"
font_family = "Noto Sans"
lang = "en"
launch_apps_as_systemd_services = false
middle_click_opens_widget_settings = true
niri_overview_type_to_launch_enabled = false
offline_mode = false
password_style = "default"
polkit_agent = false
screen_time_enabled = true
settings_show_advanced = true
show_location = true
telemetry_enabled = true
time_format = "{:%-I:%M %p}"
ui_scale = 1.0

    [shell.animation]
    enabled = true
    speed = 1.0

    [shell.mpris]
    blacklist = []

    [shell.panel]
    background_blur = true
    borders = true
    clipboard_placement = "centered"
    control_center_placement = "attached"
    launcher_categories = true
    launcher_placement = "centered"
    open_near_click_clipboard = false
    open_near_click_control_center = false
    open_near_click_launcher = false
    open_near_click_session = false
    open_near_click_wallpaper = false
    session_placement = "attached"
    shadow = true
    transparency_mode = "glass"
    wallpaper_placement = "attached"

    [shell.screen_corners]
    enabled = false
    size = 32

    [[shell.session.actions]]
    action = "lock"
    command = ""
    enabled = true
    glyph = ""
    label = ""
    shortcut = "1"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    command = ""
    enabled = true
    glyph = ""
    label = ""
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "suspend"
    command = ""
    enabled = true
    glyph = ""
    label = ""
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    command = ""
    enabled = true
    glyph = ""
    label = ""
    shortcut = "4"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    command = ""
    enabled = true
    glyph = ""
    label = ""
    shortcut = "5"
    variant = "destructive"

    [shell.shadow]
    alpha = 0.55000001192092896
    blur = 12
    offset_x = 2
    offset_y = 2

[system.monitor]
cpu_poll_seconds = 2.0
disk_poll_seconds = 10.0
enabled = true
gpu_poll_seconds = 5.0
memory_poll_seconds = 2.0
network_poll_seconds = 3.0

[theme]
builtin = "Noctalia"
community_palette = "Oxocarbon"
custom_palette = ""
mode = "auto"
source = "wallpaper"
wallpaper_scheme = "m3-content"

    [theme.templates]
    builtin_ids = []
    community_ids = []
    enable_builtin_templates = true
    enable_community_templates = true

[wallpaper]
directory = "~/Pictures/Wallpapers"
directory_dark = ""
directory_light = ""
edge_smoothness = 0.30000001192092896
enabled = true
fill_color = ""
fill_mode = "crop"
per_monitor_directories = false
transition = [ "fade", "wipe", "disc", "stripes", "zoom", "honeycomb" ]
transition_duration = 1500.0

    [wallpaper.automation]
    enabled = false
    interval_minutes = 0
    order = "random"
    recursive = true

[wallpaper.default]
path = "~/Pictures/Wallpapers/nixconfig-wallpapers/background.jpg"

[weather]
address = "Belmopan"
auto_locate = false
effects = true
enabled = true
refresh_minutes = 30
unit = "imperial"

[widget.active_window]
icon_size = 14.0
max_length = 260.0
min_length = 80.0
title_scroll = "none"
type = "active_window"

[widget.clock]
format = "{:%-I:%M %p}"
type = "clock"

[widget.control-center]
glyph = "paw-filled"
type = "control-center"

[widget.cpu]
stat = "cpu_usage"
type = "sysmon"

[widget.date]
format = "{:%A %e %b %Y}"
type = "clock"

[widget.input_volume]
device = "input"
type = "volume"

[widget.keyboard_layout]
cycle_command = ""
type = "keyboard_layout"

[widget.lock_keys]
display = "short"
hide_when_off = false
show_caps_lock = true
show_num_lock = true
show_scroll_lock = false
type = "lock_keys"

[widget.media]
art_size = 16.0
hide_when_no_media = true
max_length = 220.0
min_length = 80.0
title_scroll = "on_hover"
type = "media"

[widget.network]
show_label = false
type = "network"

[widget.network_rx]
stat = "net_rx"
type = "sysmon"

[widget.network_tx]
stat = "net_tx"
type = "sysmon"

[widget.output_volume]
device = "output"
type = "volume"

[widget.ram]
stat = "ram_used"
type = "sysmon"

[widget.spacer]
type = "spacer"

[widget.sysmon]
stat = "cpu_temp"
type = "sysmon"

[widget.temp]
stat = "cpu_temp"
type = "sysmon"

[widget.tray]
drawer = true
drawer_columns = 5
match_adjacent_spacing = true
type = "tray"
